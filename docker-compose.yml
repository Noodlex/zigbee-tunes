services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: zigbee-tunes-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    restart: unless-stopped

  zigbee-tunes:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Embed the commit SHA in the UI footer. Set it before building:
        #   COMMIT_SHA=$(git rev-parse --short HEAD) docker compose --profile full build
        COMMIT_SHA: ${COMMIT_SHA:-unknown}
    container_name: zigbee-tunes
    depends_on:
      - mosquitto
    volumes:
      - ./config.yaml:/config/config.yaml:ro
      - zigbee-tunes-data:/data
    environment:
      ZIGBEE_TUNES_CONFIG: /config/config.yaml
      MQTT_URL: mqtt://mosquitto:1883
    restart: unless-stopped
    profiles:
      - full   # ne démarre que si on lance `docker compose --profile full up`

volumes:
  mosquitto-data:
  mosquitto-log:
  zigbee-tunes-data:

# Usage :
#   docker compose up -d                   → broker seul (utile pour dev local de Zigbee Tunes avec yarn dev)
#   docker compose --profile full up -d    → broker + Zigbee Tunes containerisé
